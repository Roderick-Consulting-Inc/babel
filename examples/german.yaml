#
# GERMAN — a Brainfuck derivative by User:domi382 (2014) that substitutes the
# eight canonical instructions with their German-language nouns. The wiki
# classifies it as a TrivialBrainfuckSubstitution: pure vocabulary skin, no
# semantic additions over BF.
#
# Reference: https://esolangs.org/wiki/GERMAN
#
# Babel-fit: brainfuck_tape + 1d_unbounded + byte cells, whitespace-separated
# tokens, all uppercase single-atom German words. Methodological exemplar of a
# non-Spanish, non-English natural-language skin — broadens Babel's
# "naturalness" axis empirically.

name: GERMAN
version: "0.1.0"
description: |
  A Brainfuck derivative whose surface tokens are the German-language nouns
  for each canonical BF operation — *LINKS*, *RECHTS*, *ADDITION*,
  *SUBTRAKTION*, *EINGABE*, *AUSGABE*, *SCHLEIFENANFANG*, *SCHLEIFENENDE*.
  All-caps, whitespace-separated, no semantic additions over BF. Pure
  vocabulary skin in a third natural-language register beyond English (Ook!)
  and Spanish (Mierda / Chespirito / Rioplatense).

base_machine: brainfuck_tape
memory_shape: 1d_unbounded
cell_width: byte
encoding: whitespace_separated_tokens
io: character
theme: german-vocabulary
source_extension: .german

instructions:
  - token: "LINKS"
    op: ptr_left
    description: "Move the data pointer one cell to the left."
  - token: "RECHTS"
    op: ptr_right
    description: "Move the data pointer one cell to the right."
  - token: "ADDITION"
    op: increment
    description: "Increment the byte at the data pointer."
  - token: "SUBTRAKTION"
    op: decrement
    description: "Decrement the byte at the data pointer."
  - token: "EINGABE"
    op: input
    description: "Read one byte of input into the cell at the data pointer."
  - token: "AUSGABE"
    op: output
    description: "Output the byte at the data pointer as an ASCII character."
  - token: "SCHLEIFENANFANG"
    op: loop_start
    description: "If the byte at the data pointer is zero, jump past the matching `SCHLEIFENENDE`."
  - token: "SCHLEIFENENDE"
    op: loop_end
    description: "If the byte at the data pointer is non-zero, jump back to the matching `SCHLEIFENANFANG`."

meta:
  complexity: low
  abstraction: low
  verbosity: verbose
  playfulness: low
  unpredictability: zero
  naturalness: vocabulary
